<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Contact | NEXORA</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968267.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(135deg,#070b14,#0f172a);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
padding:35px;
border-radius:28px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 40px rgba(0,0,0,.3);
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
background:
linear-gradient(90deg,#00bfff,#7a00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
color:#94a3b8;
margin-bottom:30px;
line-height:1.7;
}

.inputBox{
margin-bottom:18px;
}

.inputBox label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#cbd5e1;
}

input,
textarea{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#111827;
color:white;
font-size:15px;
}

textarea{
resize:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:
linear-gradient(135deg,#00bfff,#7a00ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
opacity:.9;
}

.back{
display:inline-block;
margin-top:20px;
color:#00bfff;
text-decoration:none;
}

.success{
margin-top:20px;
padding:15px;
border-radius:14px;
background:#052e16;
display:none;
}

.error{
margin-top:20px;
padding:15px;
border-radius:14px;
background:#450a0a;
display:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
NEXORA
</div>

<p class="desc">
Contact us anytime and send your message directly.
</p>

<form id="contactForm">

<div class="inputBox">

<label>Your Name</label>

<input
type="text"
name="name"
required
>

</div>

<div class="inputBox">

<label>Your Email</label>

<input
type="email"
name="email"
required
>

</div>

<div class="inputBox">

<label>Your Message</label>

<textarea
name="message"
rows="6"
required
></textarea>

</div>

<button type="submit">

<i class="fa fa-paper-plane"></i>

Send Message

</button>

</form>

<div class="success" id="successMsg">

Message sent successfully ✅

</div>

<div class="error" id="errorMsg">

Failed to send message ❌

</div>

<a href="home.html" class="back">

← Back Home

</a>

</div>

<script>

const form =
document.getElementById("contactForm");

form.addEventListener("submit",

async function(e){

e.preventDefault();

const formData =
new FormData(form);

formData.append(
"access_key",
"3bee77e3-99b8-4123-b7c4-aab8fe90102a"
);

const response =
await fetch(
"https://api.web3forms.com/submit",
{
method:"POST",
body:formData
}
);

const result =
await response.json();

if(result.success){

document
.getElementById("successMsg")
.style.display = "block";

document
.getElementById("errorMsg")
.style.display = "none";

form.reset();

}else{

document
.getElementById("errorMsg")
.style.display = "block";

}

});

</script>

</body>
</html>
