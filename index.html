<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXORA Auth</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0a12,#12091f,#000);
overflow:hidden;
}

.auth-container{
width:950px;
height:580px;
display:flex;
border-radius:28px;
overflow:hidden;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 60px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.06);
}

/* LEFT */

.left-panel{
flex:1;
background:linear-gradient(135deg,#ff008c,#7a00ff,#0084ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

.left-panel::before{
content:"";
position:absolute;
width:250px;
height:250px;
background:rgba(255,255,255,0.1);
border-radius:50%;
top:-60px;
left:-60px;
}

.left-panel::after{
content:"";
position:absolute;
width:200px;
height:200px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-50px;
right:-50px;
}

.left-panel h1{
font-size:60px;
letter-spacing:4px;
margin-bottom:15px;
z-index:2;
}

.left-panel p{
font-size:18px;
line-height:1.7;
opacity:0.95;
max-width:320px;
z-index:2;
}

/* RIGHT */

.right-panel{
flex:1;
background:#0d0d18;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* TABS */

.tabs{
display:flex;
gap:10px;
margin-bottom:30px;
}

.tab{
flex:1;
padding:13px;
border:none;
border-radius:14px;
background:#181828;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.tab.active{
background:linear-gradient(135deg,#ff008c,#7a00ff);
}

/* FORMS */

.form{
display:none;
flex-direction:column;
gap:15px;
}

.form.active{
display:flex;
}

.form h2{
color:white;
margin-bottom:5px;
font-size:28px;
}

/* INPUTS */

.form input{
padding:15px;
border-radius:14px;
border:1px solid #2d2d44;
background:#171724;
color:white;
font-size:15px;
outline:none;
transition:0.3s;
}

.form input:focus{
border-color:#7a00ff;
box-shadow:0 0 15px rgba(122,0,255,0.3);
}

/* BUTTONS */

.main-btn{
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff008c,#7a00ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.main-btn:hover{
transform:translateY(-2px);
}

.google-btn{
padding:14px;
border:none;
border-radius:14px;
background:white;
color:#111;
font-size:15px;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
transition:0.3s;
}

.google-btn:hover{
background:#f0f0f0;
}

.divider{
display:flex;
align-items:center;
gap:10px;
margin:5px 0;
color:#777;
font-size:13px;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#2a2a3b;
}

.small{
font-size:12px;
color:#999;
text-align:center;
margin-top:5px;
}

.small a{
color:#00aaff;
text-decoration:none;
}

/* MOBILE */

@media(max-width:900px){

.auth-container{
flex-direction:column;
width:95%;
height:auto;
}

.left-panel{
padding:50px 20px;
}

.left-panel h1{
font-size:45px;
}

.right-panel{
padding:25px;
}

}

</style>

</head>

<body>

<div class="auth-container">

<!-- LEFT -->

<div class="left-panel">

<h1>NEXORA</h1>

<p>
منصة اجتماعية مستقبلية لنشر الأخبار والمحتوى والمعلومات بتجربة احترافية
</p>

</div>

<!-- RIGHT -->

<div class="right-panel">

<!-- TABS -->

<div class="tabs">

<button
id="loginTab"
class="tab active"
type="button"
onclick="showLogin()"
>
تسجيل الدخول
</button>

<button
id="signupTab"
class="tab"
type="button"
onclick="showSignup()"
>
إنشاء حساب
</button>

</div>

<!-- LOGIN -->

<form
id="loginForm"
class="form active"
onsubmit="return false;"
>

<h2>مرحبًا بعودتك</h2>

<input
id="loginEmail"
type="email"
placeholder="البريد الإلكتروني"
required
>

<input
id="loginPassword"
type="password"
placeholder="كلمة المرور"
required
>

<button
type="button"
class="main-btn"
id="loginBtn"
onclick="login()"
>
تسجيل الدخول
</button>

<div class="divider">
أو
</div>

<button
type="button"
class="google-btn"
onclick="googleLogin()"
>

<img
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
width="20"
>

تسجيل الدخول عبر Google

</button>

<p class="small">

<a href="reset.html">
  نسيت كلمة المرور؟
</a>

</p>

</form>

<!-- SIGNUP -->

<form
id="signupForm"
class="form"
onsubmit="return false;"
>

<h2>إنشاء حساب جديد</h2>

<input
id="signupEmail"
type="email"
placeholder="البريد الإلكتروني"
required
>

<input
id="signupPassword"
type="password"
placeholder="كلمة المرور"
required
>

<input
id="signupConfirm"
type="password"
placeholder="تأكيد كلمة المرور"
required
>

<button
type="button"
class="main-btn"
id="signupBtn"
onclick="signup()"
>
إنشاء حساب
</button>

<div class="divider">
أو
</div>

<button
type="button"
class="google-btn"
onclick="googleLogin()"
>

<img
src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
width="20"
>

المتابعة باستخدام Google

</button>

<p class="small">
بإنشاء حساب، أنت توافق على الشروط
</p>

</form>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
  
  apiKey: "AIzaSyDLSOZogDC_f23jnybhYpH_MNVCnVHeU50",
  
  authDomain: "nexora-cdf18.firebaseapp.com",
  
  projectId: "nexora-cdf18",
  
  storageBucket: "nexora-cdf18.appspot.com",
  
  messagingSenderId: "610110841134",
  
  appId: "1:610110841134:web:86985a639f4f5139315abf"
  
};
/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* CHECK USER */

onAuthStateChanged(auth,(user)=>{

if(user){

window.location.href = "home.html";

}

});

/* LOGIN */

window.login = async function(){

const email =
document.getElementById("loginEmail").value.trim();

const password =
document.getElementById("loginPassword").value.trim();

const btn =
document.getElementById("loginBtn");

if(email === "" || password === ""){

alert("املأ جميع الحقول");

return;

}

btn.disabled = true;
btn.innerText = "جاري الدخول...";

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("تم تسجيل الدخول بنجاح");

window.location.href = "home.html";

}catch(error){

alert(error.message);

}

btn.disabled = false;
btn.innerText = "تسجيل الدخول";

};

/* SIGNUP */

window.signup = async function(){

const email =
document.getElementById("signupEmail").value.trim();

const password =
document.getElementById("signupPassword").value.trim();

const confirm =
document.getElementById("signupConfirm").value.trim();

const btn =
document.getElementById("signupBtn");

if(email === "" || password === "" || confirm === ""){

alert("املأ جميع الحقول");

return;

}

if(password.length < 6){

alert("كلمة المرور يجب أن تكون 6 أحرف على الأقل");

return;

}

if(password !== confirm){

alert("كلمات المرور غير متطابقة");

return;

}

btn.disabled = true;
btn.innerText = "جاري إنشاء الحساب...";

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("تم إنشاء الحساب بنجاح");

window.location.href = "home.html";

}catch(error){

alert(error.message);

}

btn.disabled = false;
btn.innerText = "إنشاء حساب";

};

/* GOOGLE LOGIN */

window.googleLogin = async function(){

try{

await signInWithPopup(auth, provider);

window.location.href = "home.html";

}catch(error){

alert(error.message);

}

};

/* SWITCH FORMS */

window.showLogin = function(){

document
.getElementById("loginForm")
.classList.add("active");

document
.getElementById("signupForm")
.classList.remove("active");

document
.getElementById("loginTab")
.classList.add("active");

document
.getElementById("signupTab")
.classList.remove("active");

};

window.showSignup = function(){

document
.getElementById("signupForm")
.classList.add("active");

document
.getElementById("loginForm")
.classList.remove("active");

document
.getElementById("signupTab")
.classList.add("active");

document
.getElementById("loginTab")
.classList.remove("active");

};

</script>

</body>
</html>
