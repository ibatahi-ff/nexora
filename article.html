<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXORA - المقال</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968267.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: radial-gradient(circle at top,#0b1220,#070b14);
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
position:fixed;
top:0;
right:0;
width:100%;
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
background:rgba(10,15,25,0.7);
backdrop-filter:blur(22px);
border-bottom:1px solid rgba(255,255,255,0.05);
z-index:9999;
}

.logo{
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#00bfff,#7a00ff,#ff00cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.back{
padding:10px 16px;
background:#151d2f;
border-radius:12px;
text-decoration:none;
color:white;
transition:.3s;
}

.back:hover{
transform:scale(1.05);
}

/* HERO */
.hero{
margin-top:75px;
height:520px;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.6);
transform:scale(1.05);
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.95),rgba(0,0,0,0.1));
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:50px;
}

.category{
background:linear-gradient(135deg,#00bfff,#7a00ff);
padding:8px 16px;
border-radius:30px;
width:max-content;
font-size:13px;
margin-bottom:15px;
}

.title{
font-size:44px;
max-width:900px;
line-height:1.3;
margin-bottom:10px;
}

.meta{
display:flex;
gap:15px;
flex-wrap:wrap;
font-size:13px;
color:#bbb;
}

/* CONTENT */
.container{
max-width:900px;
margin:auto;
padding:50px 20px;
}

.content{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
padding:35px;
border-radius:25px;
line-height:2.2;
font-size:18px;
color:#ddd;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* ACTIONS */
.actions{
margin-top:20px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
padding:12px 18px;
border:none;
border-radius:14px;
background:#151d2f;
color:white;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.like.active{
background:linear-gradient(135deg,#ff004c,#ff4d6d);
}

/* LOADING */
.loading{
text-align:center;
padding:50px;
color:#aaa;
}

/* ERROR */
.error{
text-align:center;
padding:50px;
color:#ff4d6d;
}

/* MOBILE */
@media(max-width:900px){

.title{font-size:28px;}
.overlay{padding:25px;}
.content{font-size:16px;padding:20px;}

}

</style>

</head>

<body>

<header>

<a href="home.html" class="back">رجوع</a>

<div class="logo">NEXORA</div>

</header>

<section class="hero">

<img id="articleImage">

<div class="overlay">

<div class="category" id="articleCategory">...</div>

<div class="title" id="articleTitle">جاري التحميل...</div>

<div class="meta">
<span>🔥 NEXORA News</span>
<span>⏰ مباشر</span>
<span>👁️ قراءة ممتعة</span>
</div>

</div>

</section>

<div class="container">

<div class="content" id="articleContent">
<div class="loading">جاري تحميل المقال...</div>
</div>

<div class="actions">

<button class="btn like" onclick="like(this)">❤️ إعجاب</button>
<button class="btn">🔖 حفظ</button>
<button class="btn">📤 مشاركة</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDLSOZogDC_f23jnybhYpH_MNVCnVHeU50",
  authDomain: "nexora-cdf18.firebaseapp.com",
  projectId: "nexora-cdf18",
  storageBucket: "nexora-cdf18.appspot.com",
  messagingSenderId: "610110841134",
  appId: "1:610110841134:web:86985a639f4f5139315abf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ID */
const id = new URLSearchParams(location.search).get("id");

/* LOAD ARTICLE */
async function load(){

const title = document.getElementById("articleTitle");
const content = document.getElementById("articleContent");
const category = document.getElementById("articleCategory");
const image = document.getElementById("articleImage");

if(!id){
title.innerHTML = `<div class="error">لا يوجد مقال</div>`;
return;
}

try{

const snap = await getDoc(doc(db,"news",id));

if(!snap.exists()){
title.innerHTML = `<div class="error">المقال غير موجود</div>`;
return;
}

const data = snap.data();

title.innerText = data.title || "بدون عنوان";
category.innerText = data.category || "عام";
content.innerText = data.desc || "لا يوجد محتوى";
image.src = data.mediaUrl || "https://picsum.photos/1000/600";

}catch(e){

title.innerHTML = `<div class="error">حدث خطأ في تحميل المقال</div>`;

}

}

load();

/* LIKE */
function like(btn){
btn.classList.toggle("active");
btn.innerText = btn.classList.contains("active")
? "❤️ تم الإعجاب"
: "❤️ إعجاب";
}

</script>

</body>
</html>
